services:

  # ── Subgraph Services ────────────────────────────────────────────────────────
  # All data stores are in AWS. Load credentials and endpoints from .env

  member-service:
    build:
      context: .
      dockerfile: services/member-service/Dockerfile
    ports:
      - "8081:8081"
    env_file: .env
    environment:
      PORT: "8081"

  billing-service:
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    ports:
      - "8082:8082"
    env_file: .env
    environment:
      PORT: "8082"

  profile-service:
    build:
      context: .
      dockerfile: services/profile-service/Dockerfile
    ports:
      - "8083:8083"
    env_file: .env
    environment:
      PORT: "8083"

  entitlement-service:
    build:
      context: .
      dockerfile: services/entitlement-service/Dockerfile
    ports:
      - "8084:8084"
    env_file: .env
    environment:
      PORT: "8084"

  discovery-service:
    build:
      context: .
      dockerfile: services/discovery-service/Dockerfile
    ports:
      - "8085:8085"
    env_file: .env
    environment:
      PORT: "8085"

  # ── Consumer Edge ────────────────────────────────────────────────────────────

  router:
    image: ghcr.io/apollographql/router:v1.55.0
    ports:
      - "4000:4000"
    volumes:
      - ./services/router/router.yaml:/dist/config/router.yaml:ro
      - ./services/router/supergraph.graphql:/dist/config/supergraph.graphql:ro
    command: ["--config", "/dist/config/router.yaml", "--supergraph", "/dist/config/supergraph.graphql"]
    depends_on:
      - member-service
      - billing-service
      - profile-service
      - entitlement-service
      - discovery-service
