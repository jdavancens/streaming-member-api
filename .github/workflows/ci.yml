name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [member-service, billing-service, profile-service, entitlement-service, discovery-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install
        run: npm ci
        working-directory: services/${{ matrix.service }}

      - name: Build (tsc)
        run: npm run build
        working-directory: services/${{ matrix.service }}

      - name: Test
        run: npm test --if-present
        working-directory: services/${{ matrix.service }}

  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: All CI checks passed
        run: |
          if [[ "${{ needs.build.result }}" == "failure" ]]; then exit 1; fi
          echo "OK"
