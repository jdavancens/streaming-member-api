# Reusable workflow — called by each service's deploy workflow
name: Deploy Service (reusable)

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      aws_region:
        required: false
        type: string
        default: us-east-1
    secrets:
      AWS_ACCOUNT_ID:
        required: true
      AWS_OIDC_ROLE_ARN:
        required: true

jobs:
  build-and-deploy:
    name: Build, push, deploy ${{ inputs.service }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ inputs.service }}/package-lock.json

      - name: Install and build
        run: npm ci && npm run build
        working-directory: services/${{ inputs.service }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/member-api-dev/${{ inputs.service }}:$IMAGE_TAG \
                       -t $ECR_REGISTRY/member-api-dev/${{ inputs.service }}:latest \
                       -f services/${{ inputs.service }}/Dockerfile \
                       .
          docker push $ECR_REGISTRY/member-api-dev/${{ inputs.service }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/member-api-dev/${{ inputs.service }}:latest

      - name: Deploy to ECS Fargate
        run: |
          aws ecs update-service \
            --cluster member-api-dev \
            --service ${{ inputs.service }} \
            --force-new-deployment \
            --region ${{ inputs.aws_region }}

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster member-api-dev \
            --services ${{ inputs.service }} \
            --region ${{ inputs.aws_region }}

      - name: Smoke test
        env:
          ALB_DNS: ${{ vars.ALB_DNS }}
        run: |
          echo "Hitting GraphQL endpoint at http://$ALB_DNS/ ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "http://$ALB_DNS/" \
              -H 'Content-Type: application/json' \
              -d '{"query":"{ __typename }"}')
            if [[ "$STATUS" == "200" ]]; then
              echo "Smoke test passed (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Smoke test failed after 5 attempts"
          exit 1
