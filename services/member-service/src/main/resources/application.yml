spring:
  application:
    name: member-service

  data:
    cassandra:
      contact-points: ${SPRING_DATA_CASSANDRA_CONTACT_POINTS:localhost}
      port: ${SPRING_DATA_CASSANDRA_PORT:9042}
      local-datacenter: ${SPRING_DATA_CASSANDRA_LOCAL_DATACENTER:datacenter1}
      keyspace-name: ${SPRING_DATA_CASSANDRA_KEYSPACE_NAME:member_api}
      schema-action: create-if-not-exists

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

  graphql:
    schema:
      locations: classpath:graphql/
    graphiql:
      enabled: true

dgs:
  graphql:
    schema-locations: classpath:graphql/**

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars}

management:
  endpoints:
    web:
      exposure:
        include: health,info
